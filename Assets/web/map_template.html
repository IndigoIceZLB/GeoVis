<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GeoVis Map</title>
    <!-- 引入 Leaflet 和 ECharts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            padding: 0;
            margin: 0;
            background-color: #F8F9FA;
        }

        html, body, #map {
            height: 100%;
            width: 100%;
        }

        .leaflet-control-attribution {
            display: none;
        }

        /* ECharts 悬浮面板样式 */
        #chartPanel {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 600px; /* 【修改】：基础宽度扩宽到 1.5倍 */
            height: 280px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
            resize: both; /* 【新增】：允许用户在右下角自由拖拽拉伸大小！ */
            overflow: hidden; /* 配合 resize 必须的属性 */
        }

        #chartTitle {
            font-weight: bold;
            color: #4FC1E9;
            margin-bottom: 5px;
            font-size: 14px;
        }

        #echartsDom {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- 悬浮的 ECharts 面板 -->
    <div id="chartPanel">
        <div id="chartTitle">实时气象站降水量</div>
        <div id="echartsDom"></div>
    </div>

    <script>
        // --- 1. 初始化地图 ---
        var map = L.map('map').setView([23.1291, 113.2644], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        function getColor(d) {
            return d > 20000 ? '#800026' : d > 10000 ? '#BD0026' : d > 5000 ? '#E31A1C' :
                d > 2000 ? '#FC4E2A' : d > 500 ? '#FD8D3C' : d > 100 ? '#FEB24C' : '#FFEDA0';
        }

        function getDiffColor(d) {
            if (d > 500) return '#b2182b'; if (d > 100) return '#ef8a62'; if (d > 10) return '#fddbc7';
            if (d < -500) return '#2166ac'; if (d < -100) return '#67a9cf'; if (d < -10) return '#d1e5f0';
            return 'transparent';
        }

        var geoJsonLayer;

        // --- 2. 渲染网格核心函数 ---
        function renderGeoData(dataObj) {
            try {
                if (geoJsonLayer) map.removeLayer(geoJsonLayer);
                var mode = dataObj.map_mode; // 'OD 轨迹流向', '网格驻留人口', '月度常住人口'
                var odMode = dataObj.od_display_mode; // '总流量', '流出流量', '流入流量'
                var analysisMode = dataObj.analysis_mode; // '绝对值分布', '时空环比做差'

                geoJsonLayer = L.geoJSON(dataObj, {
                    style: function (feature) {
                        var v1 = feature.properties.val1 || 0;
                        var v2 = feature.properties.val2 || 0;
                        var fillCol = "transparent";

                        // 【核心渲染逻辑解耦】
                        if (analysisMode === '时空环比做差') {
                            fillCol = getDiffColor(v2); // 做差模式下，后端统一将差值塞在 v2 里
                        } else {
                            if (mode === 'OD 轨迹流向') {
                                // 绝对值模式下，OD 依然保持原来的 v1(出), v2(入) 结构
                                var renderVal = v1;
                                if (odMode === '流入流量') renderVal = v2;
                                if (odMode === '总流量') renderVal = v1 + v2;
                                fillCol = renderVal > 0 ? getColor(renderVal) : "transparent";
                            } else {
                                fillCol = v1 > 0 ? getColor(v1) : "transparent";
                            }
                        }
                        return { fillColor: fillCol, weight: 0.5, opacity: 1, color: '#9A9A9A', fillOpacity: 0.8 };
                    },
                    onEachFeature: function (feature, layer) {
                        var v1 = feature.properties.val1 || 0;
                        var v2 = feature.properties.val2 || 0;
                        var cid = feature.properties.cid || "未知";
                        var tooltipHtml = `<div style="font-family: Arial; font-size: 13px;"><b>网格 ID:</b> ${cid}<br/>`;

                        // 【统一的 Tooltip 构建逻辑】
                        if (analysisMode === '时空环比做差') {
                            var changeStr = v2 > 0 ? `<span style="color:#b2182b;">↑ 增加 ${v2}</span>` : `<span style="color:#2166ac;">↓ 减少 ${Math.abs(v2)}</span>`;
                            var metricName = mode === 'OD 轨迹流向' ? `OD (${odMode})` : "网格驻留人口";
                            tooltipHtml += `● 当前 ${metricName}: ${v1}<br/>● 差值变化: ${changeStr}`;
                        } else {
                            if (mode === 'OD 轨迹流向') {
                                var total = v1 + v2;
                                var outBold = odMode === '流出流量' ? 'font-weight:bold;background:#fde0dd;' : '';
                                var inBold = odMode === '流入流量' ? 'font-weight:bold;background:#deebf7;' : '';
                                var totBold = odMode === '总流量' ? 'font-weight:bold;background:#f0f0f0;' : '';
                                tooltipHtml += `<span style="color: #E31A1C; display:block; ${outBold}">● 流出: ${v1}</span>` +
                                    `<span style="color: #1F78B4; display:block; ${inBold}">● 流入: ${v2}</span>` +
                                    `<span style="color: #333333; display:block; ${totBold}">● 总流量: ${total}</span>`;
                            } else if (mode === '网格驻留人口') {
                                tooltipHtml += `● 驻留人口: ${v1}`;
                            } else {
                                tooltipHtml += `● 常住人口: ${v1}<br/>● 联通推算: ${v2}`;
                            }
                        }
                        tooltipHtml += `</div>`;
                        layer.bindTooltip(tooltipHtml);
                    }
                }).addTo(map);
            } catch (e) { console.error(e); }
        }

        // --- 3. 初始化 ECharts ---
        var myChart = echarts.init(document.getElementById('echartsDom'));

        // 【新增】：监听面板的拖拽缩放事件，让图表实时重绘自适应
        new ResizeObserver(function () {
            var panel = document.getElementById('chartPanel');
            if (myChart && panel.style.display !== 'none') {
                myChart.resize();
            }
        }).observe(document.getElementById('chartPanel'));

        function renderECharts(chartData) {
            var panel = document.getElementById('chartPanel');
            if (!chartData || !chartData.show) {
                panel.style.display = 'none'; // 隐藏弹窗
                return;
            }

            // 【核心修复】：必须先设为 block，让 DOM 拥有宽高，然后再 resize！
            panel.style.display = 'block';
            myChart.resize();

            document.getElementById('chartTitle').innerText = `实时气象站降水量 (时间 ${chartData.time})`;

            var option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: chartData.stations,
                    axisLabel: { interval: 0, rotate: 30, fontSize: 10 } // 倾斜防重叠
                },
                yAxis: { type: 'value', name: '降水(mm)', nameTextStyle: { fontSize: 10 } },
                series: [{
                    data: chartData.values,
                    type: 'bar',
                    itemStyle: { color: '#4FC1E9', borderRadius: [2, 2, 0, 0] },
                    label: { show: true, position: 'top', formatter: '{c}' }
                }]
            };
            // 设置数据加上 true 参数，强制每次清空旧数据重新渲染，确保取消勾选时柱子能消失
            myChart.setOption(option, true);
        }

        // --- 4. 统一的消息分发中心 ---
        window.chrome.webview.addEventListener('message', event => {
            var payload = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;

            // 根据 C# 传来的 type 字段，决定渲染地图还是图表
            if (payload.type === 'rainfall_chart') {
                renderECharts(payload);
            } else {
                renderGeoData(payload); // 默认渲染地图 GeoJSON
            }
        });
    </script>
</body>
</html>
