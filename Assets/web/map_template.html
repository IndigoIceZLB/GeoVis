<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GeoVis Map</title>
    <!-- 引入 Leaflet 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            padding: 0;
            margin: 0;
            background-color: #F8F9FA;
        }

        html, body, #map {
            height: 100%;
            width: 100%;
        }

        .leaflet-control-attribution {
            display: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- 引入 Leaflet 脚本 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地图容器和 CartoDB 底图
        var map = L.map('map').setView([23.1291, 113.2644], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // 2. 颜色阈值函数
        function getColor(d) {
            return d > 50000 ? '#800026' :
                d > 20000 ? '#BD0026' :
                    d > 10000 ? '#E31A1C' :
                        d > 5000 ? '#FC4E2A' :
                            d > 2000 ? '#FD8D3C' :
                                d > 500 ? '#FEB24C' :
                                    d > 100 ? '#FED976' :
                                        '#FFEDA0';
        }

        var geoJsonLayer;

        // 3. 渲染 GeoJSON 的核心函数
        function renderGeoData(geoData) {
            try {
                if (geoJsonLayer) {
                    map.removeLayer(geoJsonLayer);
                }

                // 兼容性处理：如果 C# 传过来的是 JSON 字符串，则解析；如果是对象，则直接用
                var dataObj = typeof geoData === 'string' ? JSON.parse(geoData) : geoData;

                geoJsonLayer = L.geoJSON(dataObj, {
                    style: function (feature) {
                        // 【关键】：这里绑定的是 outflow 流出量来渲染颜色
                        var val = feature.properties.outflow || 0;
                        return {
                            fillColor: val > 0 ? getColor(val) : "transparent",
                            weight: 0.5,
                            opacity: 1,
                            color: '#9A9A9A',
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        var outV = feature.properties.outflow || 0;
                        var inV = feature.properties.inflow || 0;
                        var cid = feature.properties.cid || "未知";

                        var tooltipHtml = `
                                <div style="font-family: Arial; font-size: 13px;">
                                    <b>网格 ID:</b> ${cid}<br/>
                                    <span style="color: #E31A1C;">● 流出量: ${outV}</span><br/>
                                    <span style="color: #1F78B4;">● 流入量: ${inV}</span>
                                </div>
                            `;
                        layer.bindTooltip(tooltipHtml);
                    }
                }).addTo(map);

            } catch (error) {
                console.error("渲染地图时出错:", error);
            }
        }

        // 4. 监听 C# 发来的消息
        window.chrome.webview.addEventListener('message', event => {
            renderGeoData(event.data);
        });
    </script>
</body>
</html>
